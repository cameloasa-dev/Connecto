version: 2
updates:
  # ============================================
  # Frontend (npm) — SAFE MODE
  # ============================================
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Stockholm"

    # Only update lockfile, never bump package.json
    versioning-strategy: "lockfile-only"

    commit-message:
      prefix: "fix(deps)"
      prefix-development: "chore(dev-deps)"
      include: "scope"

    # Ignore dangerous packages that break easily
    ignore:
      - dependency-name: "vite"
      - dependency-name: "@vitejs/*"
      - dependency-name: "typescript"
      - dependency-name: "@types/*"
      - dependency-name: "playwright"
      - dependency-name: "eslint*"

    labels:
      - "dependencies"
      - "security"
      - "frontend"

    open-pull-requests-limit: 5

  # ============================================
  # Backend (pip) — SAFE MODE
  # ============================================
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Stockholm"

    # Only allow minor/patch updates
    versioning-strategy: "auto"

    commit-message:
      prefix: "fix(deps-python)"
      include: "scope"

    groups:
      python-safe-updates:
        update-types:
          - "minor"
          - "patch"

    # Block major updates entirely
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

    labels:
      - "dependencies"
      - "security"
      - "backend"

    open-pull-requests-limit: 5

  # ============================================
  # GitHub Actions
  # ============================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Stockholm"

    labels:
      - "ci"
      - "dependencies"

    open-pull-requests-limit: 5
