name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: test
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: 🐍 Setup backend env (SQLite)
        run: |
          echo "DATABASE_URL=sqlite:///./test.db" > backend/.env
          echo "ENVIRONMENT=test" >> backend/.env
          make install-backend

      - name: 🐍 Lint backend
        run: make lint-backend

      - name: 🐍 Run backend tests
        run: make test-backend
